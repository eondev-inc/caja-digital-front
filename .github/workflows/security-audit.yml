name: security-audit

on:
  push:
    branches: [master]
  pull_request:

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      # Lockfile integrity — fail fast on lockfile drift (Docker contract)
      - run: pnpm install --frozen-lockfile

      # Lint — max-warnings 0 enforced per AGENTS.md
      - run: pnpm lint

      # Build — VITE_API_URL / VITE_API_KEY are public identifiers (audit F-03
      # classification, see docs/security/FINDINGS_REGISTRY.md). Not secrets.
      - run: pnpm build
        env:
          VITE_API_URL: ${{ vars.VITE_API_URL }}
          VITE_API_KEY: ${{ vars.VITE_API_KEY }}

      # Dependency hygiene gate — block the PR on high or critical advisories.
      - run: pnpm audit --prod --audit-level high